<!-- EFFECT: CURSOR_GLOW -->
<div id="effect-cursor-glow" class="fixed z-0 pointer-events-none" aria-hidden="true"
     style="width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,0.08) 0%,transparent 70%);transform:translate(-50%,-50%);top:0;left:0;transition:opacity 0.3s;">
</div>
<script>
(function(){
  var el = document.getElementById('effect-cursor-glow');
  if (!el || window.matchMedia('(prefers-reduced-motion: reduce)').matches) { if(el) el.style.display='none'; return; }
  var x=0, y=0, cx=0, cy=0, raf;
  document.addEventListener('mousemove', function(e) { x=e.clientX; y=e.clientY; });
  function tick(){ cx+=(x-cx)*0.08; cy+=(y-cy)*0.08; el.style.left=cx+'px'; el.style.top=cy+'px'; raf=requestAnimationFrame(tick); }
  tick();
  document.addEventListener('visibilitychange', function() { if(document.hidden) cancelAnimationFrame(raf); else tick(); });
})();
</script>
<!-- /EFFECT: CURSOR_GLOW -->
