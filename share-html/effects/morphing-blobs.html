<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect: Morphing Blobs</title>
  <style>body { margin: 0; background: #0b1020; min-height: 100vh; overflow: hidden; }</style>
</head>
<body>

<!-- EFFECT: MORPHING-BLOBS -->
<canvas id="fx-blobs" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>
<script>
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('fx-blobs');
  const ctx = canvas.getContext('2d');
  let raf, paused = false;

  const BLOBS = [
    { cx: 0.3, cy: 0.3, r: 180, color: 'rgba(34,211,238,0.15)',   speed: 0.0008, phase: 0 },
    { cx: 0.7, cy: 0.6, r: 150, color: 'rgba(167,139,250,0.12)',  speed: 0.0006, phase: 2 },
    { cx: 0.5, cy: 0.8, r: 160, color: 'rgba(244,114,182,0.10)',  speed: 0.0007, phase: 4 },
  ];

  const STEPS = 64;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) raf = requestAnimationFrame(loop);
  });

  function drawBlob(blob, t, W, H) {
    const bx = blob.cx * W;
    const by = blob.cy * H;

    ctx.beginPath();
    for (let i = 0; i <= STEPS; i++) {
      const angle = (i / STEPS) * Math.PI * 2;
      const wobble =
        Math.sin(angle * 3 + t * blob.speed + blob.phase) * 20 +
        Math.sin(angle * 5 - t * blob.speed * 0.7) * 15 +
        Math.sin(angle * 7 + t * blob.speed * 1.3) * 10;
      const r = blob.r + wobble;
      const x = bx + Math.cos(angle) * r;
      const y = by + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = blob.color;
    ctx.fill();
  }

  function loop(ts) {
    if (paused) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.filter = 'blur(40px)';
    BLOBS.forEach(function (blob) {
      drawBlob(blob, ts, canvas.width, canvas.height);
    });
    ctx.filter = 'none';

    raf = requestAnimationFrame(loop);
  }

  raf = requestAnimationFrame(loop);
})();
</script>
<!-- /EFFECT: MORPHING-BLOBS -->

<div style="position:relative;z-index:1;color:#94a3b8;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
  <h1 style="font-size:2.5rem;color:#e2e8f0;margin:0 0 8px;">Morphing Blobs</h1>
  <p style="font-size:0.875rem;margin:0;">share-html · Medium effect · Organic shapes</p>
</div>

</body>
</html>
