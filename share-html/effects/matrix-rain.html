<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect: Matrix Rain</title>
  <style>body { margin: 0; background: #0b1020; min-height: 100vh; overflow: hidden; }</style>
</head>
<body>

<!-- EFFECT: MATRIX-RAIN -->
<canvas id="fx-matrix" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>
<script>
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('fx-matrix');
  const ctx = canvas.getContext('2d');
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+=<>{}[]~/|';
  const FONT_SIZE = 14;
  const INTERVAL = 50;
  let drops = [];
  let cols = 0;
  let lastTime = 0;
  let raf, paused = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cols = Math.floor(canvas.width / FONT_SIZE);
    const prev = drops.slice();
    drops = Array.from({ length: cols }, function (_, i) {
      return prev[i] !== undefined ? prev[i] : -Math.floor(Math.random() * 100);
    });
  }

  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) raf = requestAnimationFrame(loop);
  });

  function loop(ts) {
    if (paused) return;
    raf = requestAnimationFrame(loop);

    if (ts - lastTime < INTERVAL) return;
    lastTime = ts;

    ctx.fillStyle = 'rgba(11,16,32,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = FONT_SIZE + 'px monospace';

    for (let i = 0; i < cols; i++) {
      if (drops[i] < 0) {
        drops[i]++;
        continue;
      }
      const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
      const alpha = 0.6 + Math.random() * 0.4;
      ctx.fillStyle = 'rgba(34,197,94,' + alpha + ')';
      ctx.fillText(ch, i * FONT_SIZE, drops[i] * FONT_SIZE);

      if (drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      } else {
        drops[i]++;
      }
    }
  }

  raf = requestAnimationFrame(loop);
})();
</script>
<!-- /EFFECT: MATRIX-RAIN -->

<div style="position:relative;z-index:1;color:#94a3b8;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
  <h1 style="font-size:2.5rem;color:#e2e8f0;margin:0 0 8px;">Matrix Rain</h1>
  <p style="font-size:0.875rem;margin:0;">share-html · Medium effect · Katakana rain</p>
</div>

</body>
</html>
