<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect: Parallax Depth</title>
  <style>body { margin: 0; background: #0b1020; min-height: 200vh; overflow-x: hidden; }</style>
</head>
<body>

<!-- EFFECT: PARALLAX-DEPTH -->
<canvas id="fx-parallax" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>
<script>
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const canvas = document.getElementById('fx-parallax');
  const ctx = canvas.getContext('2d');
  let raf, paused = false;

  const LAYERS = [
    { count: 40, speed: 0.02, size: 1.2, alpha: 0.3  },
    { count: 25, speed: 0.05, size: 2,   alpha: 0.5  },
    { count: 15, speed: 0.1,  size: 3,   alpha: 0.7  },
  ];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resize();
  window.addEventListener('resize', resize);

  const dots = LAYERS.map(function (layer) {
    return {
      layer: layer,
      pts: Array.from({ length: layer.count }, function () {
        return { x: Math.random() * 2000, y: Math.random() * 2000 };
      }),
    };
  });

  document.addEventListener('visibilitychange', function () {
    paused = document.hidden;
    if (!paused) raf = requestAnimationFrame(loop);
  });

  function loop() {
    if (paused) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const W = canvas.width;
    const H = canvas.height;
    const scrollY = window.scrollY || 0;

    dots.forEach(function (group) {
      const layer = group.layer;
      ctx.fillStyle = 'rgba(148,163,184,' + layer.alpha + ')';
      group.pts.forEach(function (p) {
        const sx = (p.x / 2000) * W;
        const rawY = p.y - scrollY * layer.speed;
        const sy = ((rawY % H) + H) % H;

        ctx.beginPath();
        ctx.arc(sx, sy, layer.size, 0, Math.PI * 2);
        ctx.fill();
      });
    });

    raf = requestAnimationFrame(loop);
  }

  raf = requestAnimationFrame(loop);
})();
</script>
<!-- /EFFECT: PARALLAX-DEPTH -->

<div style="position:relative;z-index:1;color:#94a3b8;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
  <h1 style="font-size:2.5rem;color:#e2e8f0;margin:0 0 8px;">Parallax Depth</h1>
  <p style="font-size:0.875rem;margin:0 0 40px;">share-html · Medium effect · Scroll down to see parallax</p>
  <svg style="width:24px;height:24px;opacity:0.4;animation:bounce 2s infinite;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
  </svg>
  <style>@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}</style>
</div>

</body>
</html>
